name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Go dependencies
        run: go mod download

      - name: Run Go vet
        run: go vet ./...

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: ./frontend
        run: npm run lint --if-present

  backend:
    name: Backend Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go dependencies
        run: go mod download

      - name: Run handler and middleware tests
        run: go test -v -race ./internal/handlers ./internal/middleware

      - name: Run stable service tests
        run: go test -v ./internal/services -run "TestNormalizeNodeProtocols|TestNodeSupportsProtocol" -count=1

      - name: Build backend entrypoints
        run: |
          go build ./cmd/server
          go build ./cmd/init-account

  frontend:
    name: Frontend Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        env:
          CI: "true"
        run: npm run test --if-present

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Go dependencies
        run: go mod download

      - name: Build backend binaries
        run: |
          mkdir -p bin
          CGO_ENABLED=1 GOOS=linux go build -ldflags="-s -w" -o bin/panel ./cmd/server
          CGO_ENABLED=1 GOOS=linux go build -ldflags="-s -w" -o bin/init-account ./cmd/init-account

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Prepare release bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release/bakaray-panel-linux-amd64
          cp bin/panel release/bakaray-panel-linux-amd64/panel
          cp bin/init-account release/bakaray-panel-linux-amd64/init-account
          cp .env.example release/bakaray-panel-linux-amd64/.env.example
          cp install.sh release/bakaray-panel-linux-amd64/install.sh
          cp README.md release/bakaray-panel-linux-amd64/README.md
          cp LICENSE release/bakaray-panel-linux-amd64/LICENSE
          cp docker-compose.yml release/bakaray-panel-linux-amd64/docker-compose.yml
          cp docker-compose.external.yml release/bakaray-panel-linux-amd64/docker-compose.external.yml
          cp Dockerfile.panel release/bakaray-panel-linux-amd64/Dockerfile.panel
          cp -R config release/bakaray-panel-linux-amd64/config
          cp -R docker release/bakaray-panel-linux-amd64/docker
          cp -R frontend/dist release/bakaray-panel-linux-amd64/frontend-dist
          tar -C release -czf release/bakaray-panel-linux-amd64.tar.gz bakaray-panel-linux-amd64
          sha256sum release/bakaray-panel-linux-amd64.tar.gz > release/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panel-build-artifacts
          path: |
            bin/
            frontend/dist/
          retention-days: 7

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: panel-release-assets
          path: |
            release/bakaray-panel-linux-amd64.tar.gz
            release/SHA256SUMS
          retention-days: 30

  legacy-backend-tests:
    name: Legacy Backend Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bakaray_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Go dependencies
        run: go mod download

      - name: Run legacy full Go test suite
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: bakaray_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: go test -v ./...

  docker:
    name: Build and Push Panel Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for panel
        id: meta-panel
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/panel
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push panel image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.panel
          push: true
          tags: ${{ steps.meta-panel.outputs.tags }}
          labels: ${{ steps.meta-panel.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: panel-release-assets
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/bakaray-panel-linux-amd64.tar.gz
            release-assets/SHA256SUMS

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != ''
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /app/bakaray
            docker-compose pull
            docker-compose up -d
            docker system prune -f
